name: Claude Code — Kira Auto Development

on:
  # Issue-driven: new issues or assignments trigger Claude
  issues:
    types: [opened, assigned]

  # PR review: Claude reviews and suggests improvements
  pull_request:
    types: [opened, synchronize]

  # Comment-driven: @claude mention in issues/PRs
  issue_comment:
    types: [created]

  # Scheduled: every 6 hours, pick up unresolved issues
  schedule:
    - cron: '0 */6 * * *'

jobs:
  claude-issue:
    if: >
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"

  claude-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          review_on_pr: true

  claude-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Check the open issues in this repository.
            Pick the highest priority unassigned issue.
            Implement it following the project's DESIGN.md and PLAN.md.
            Create a PR with the implementation.
            Focus on:
            1. Writing new Skills (skills/community/*.json)
            2. Writing new Scars (skills/scars/*.json)
            3. Improving the MCP server (src/*.ts)
            4. Fixing bugs
            Always run `npm run demo` to verify your changes work.
