name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  client:
    name: client (build + tests + skill validation)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run demo

      - name: stats.json freshness (badge must not lie)
        run: node scripts/gen-stats.mjs --check

      - name: corpus.json freshness (feed must match the repo)
        run: node scripts/gen-corpus.mjs --check

      - name: Validate skill / scar JSON
        run: |
          python3 - <<'PY'
          import json, pathlib, sys
          bad = []
          for p in pathlib.Path("skills").rglob("*.json"):
              try:
                  data = json.loads(p.read_text(encoding="utf-8"))
              except json.JSONDecodeError as e:
                  bad.append(f"{p}: {e}")
                  continue
              required = ["id", "keywords", "title", "summary", "version", "updated_at"]
              missing = [k for k in required if k not in data]
              if missing:
                  bad.append(f"{p}: missing keys {missing}")
          for p in pathlib.Path("routes").rglob("*.json"):
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except json.JSONDecodeError as e:
                  bad.append(f"{p}: {e}")
          if bad:
              for b in bad:
                  print("FAIL", b)
              sys.exit(1)
          print("OK — all skill/scar/route JSON validates")
          PY

  docker:
    name: docker (build + stdio handshake)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t kira-ci .
      - name: MCP handshake inside the container
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | timeout 60 docker run -i --rm kira-ci > /tmp/mcp-out.jsonl
          python3 - <<'PY'
          import json
          tools = None
          for line in open('/tmp/mcp-out.jsonl'):
              line = line.strip()
              if not line: continue
              try: d = json.loads(line)
              except: continue
              if d.get('id') == 2:
                  tools = [t['name'] for t in d['result']['tools']]
          assert tools and len(tools) >= 10, f"tools/list failed: {tools}"
          print('OK — container serves', len(tools), 'tools')
          PY

  worker:
    name: worker (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # wrangler 4.102+ requires Node >= 22
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci
      # vitest's miniflare pool provides the cloudflare:test types at run
      # time, which standalone tsc cannot see — rely on vitest for typing.
      - run: npm test

  privacy-demo:
    name: demo:privacy smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: client
    env:
      NO_COLOR: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run demo:privacy | tee /tmp/demo-privacy.txt
      - name: Assert redactions
        run: |
          grep -F '[REDACTED]' /tmp/demo-privacy.txt
          grep -F '[EMAIL]'    /tmp/demo-privacy.txt
          grep -F '[IP]'       /tmp/demo-privacy.txt
          grep -F '[UUID]'     /tmp/demo-privacy.txt
          grep -F '/[USER]'    /tmp/demo-privacy.txt
