name: deploy-worker

# Autonomous deploy rail for the telemetry/corpus worker.
#
# Gated by the repo variable CF_DEPLOY_ENABLED=true so main stays green
# until the one-time setup is done:
#   1. Cloudflare dashboard → API token (Workers Scripts: Edit)
#   2. gh secret set CLOUDFLARE_API_TOKEN
#      gh secret set CLOUDFLARE_ACCOUNT_ID
#   3. gh variable set CF_DEPLOY_ENABLED --body true
# After that, any merge touching worker/ deploys automatically, and
# workflow_dispatch allows a manual (or agent-triggered) deploy anytime.

on:
  push:
    branches: [main]
    paths: ["worker/**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    # Ref gate: workflow_dispatch can be pointed at any ref, and the workflow
    # definition runs FROM that ref — without this, a modified copy on a rogue
    # branch could mint the deploy secrets. main only, always.
    if: vars.CF_DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # wrangler 4.102+ requires Node >= 22
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - name: materialize D1 database id (repo keeps a placeholder)
        env:
          D1_ID: ${{ secrets.CLOUDFLARE_D1_ID }}
        run: |
          if grep -q 'PLACEHOLDER_REPLACE_AFTER_d1_create' wrangler.toml; then
            if [ -z "$D1_ID" ]; then
              echo "::error::wrangler.toml carries a placeholder D1 id and CLOUDFLARE_D1_ID is unset — run 'npx wrangler d1 list' once, then: gh secret set CLOUDFLARE_D1_ID"
              exit 1
            fi
            sed -i "s/PLACEHOLDER_REPLACE_AFTER_d1_create/$D1_ID/" wrangler.toml
          fi
      - name: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
      - name: smoke the live corpus route
        run: |
          sleep 5
          curl -fsS "https://kira-telemetry.workers.dev/v1/corpus" | head -c 400
